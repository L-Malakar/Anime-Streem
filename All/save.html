<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saved Anime — ANIvalted</title>
  <meta name="description" content="Your saved anime collection on ANIvalted." />
  <meta name="theme-color" content="#080810" />
  <link rel="icon" type="image/png" href="logo.PNG" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Serif+JP:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #080810; --surface: #0e0e1a; --surface2: #14141f;
      --border: rgba(255,255,255,0.06); --red: #e8321a;
      --red-glow: rgba(232,50,26,0.35); --orange: #f97316;
      --gold: #f5c842; --text: #e8e8f0; --muted: #6b6b80;
      --font-display: 'Bebas Neue', sans-serif;
      --font-jp: 'Noto Serif JP', serif;
      --font-body: 'Inter', sans-serif;
    }

    /* Mobile-only elements hidden on desktop */
    #mob-top-bar, #mob-tab-bar { display: none; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text); font-family: var(--font-body);
      min-height: 100vh; overflow-x: hidden;
      user-select: none; -webkit-user-select: none;
    }
    input, textarea { user-select: text; -webkit-user-select: text; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 1000;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--red); border-radius: 2px; }

    /* ===== NAV ===== */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 500;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2.5rem; height: 64px;
      background: rgba(8,8,16,0.9); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: var(--font-display); font-size: 1.8rem;
      letter-spacing: 3px; color: var(--text); text-decoration: none;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .nav-logo img { height: 36px; width: auto; object-fit: contain; }
    .nav-logo span { color: var(--red); }
    .nav-hamburger {
      display: none; background: none; border: none; color: var(--text);
      cursor: pointer; padding: 4px;
    }

    /* ===== PAGE HEADER ===== */
    .page-header {
      padding: 120px 2.5rem 3rem;
      background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(232,50,26,0.08) 0%, transparent 70%);
      border-bottom: 1px solid var(--border);
    }
    .page-header-inner { max-width: 1400px; margin: 0 auto; }
    .page-header-top { display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
    .page-header-eyebrow { font-family: var(--font-jp); font-size: 0.8rem; color: var(--red); letter-spacing: 4px; margin-bottom: 0.75rem; }
    .page-header-title { font-family: var(--font-display); font-size: clamp(2.5rem, 8vw, 5rem); letter-spacing: 6px; line-height: 1; }
    .page-header-title span { color: var(--red); }
    .page-header-meta { font-size: 0.8rem; color: var(--muted); letter-spacing: 1px; margin-top: 0.75rem; }
    .clear-all-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.5rem 1.2rem; border-radius: 5px;
      border: 1px solid rgba(232,50,26,0.3); background: transparent;
      color: var(--red); font-family: var(--font-body); font-size: 0.75rem;
      letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer;
      transition: all 0.2s;
    }
    .clear-all-btn:hover { background: rgba(232,50,26,0.1); border-color: var(--red); }

    /* ===== FILTER TABS ===== */
    .filters-bar {
      max-width: 1400px; margin: 0 auto;
      padding: 2rem 2.5rem 0;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
    }
    .filter-tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .filter-tab {
      padding: 0.4rem 1rem; border-radius: 4px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-family: var(--font-body);
      font-size: 0.75rem; letter-spacing: 1.5px; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s;
    }
    .filter-tab:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .filter-tab.active { background: var(--red); color: #fff; border-color: var(--red); }
    .sort-select {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      font-family: var(--font-body); font-size: 0.75rem; letter-spacing: 1px;
      padding: 0.4rem 0.75rem; border-radius: 4px; cursor: pointer; outline: none;
      transition: border-color 0.2s;
    }
    .sort-select:focus { border-color: var(--red); }

    /* ===== GRID ===== */
    .saved-grid-wrap { max-width: 1400px; margin: 0 auto; padding: 2rem 2.5rem 6rem; }
    .saved-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1rem;
    }
    @media (max-width: 1100px) { .saved-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 900px)  { .saved-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 580px)  { .saved-grid { grid-template-columns: repeat(2, 1fr); } }

    /* ===== ANIME CARD ===== */
    .anime-card {
      position: relative; text-decoration: none; color: var(--text);
      display: block; border-radius: 8px; overflow: hidden;
      border: 1px solid var(--border); background: var(--surface);
      transition: transform 0.3s, border-color 0.2s;
    }
    .anime-card:hover { transform: translateY(-5px); border-color: rgba(232,50,26,0.45); }
    .anime-card-img-wrap { position: relative; width: 100%; aspect-ratio: 2/3; overflow: hidden; }
    .anime-card-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s; }
    .anime-card:hover .anime-card-img-wrap img { transform: scale(1.05); }
    .anime-card-state {
      position: absolute; top: 8px; left: 8px;
      font-size: 0.55rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;
      padding: 2px 7px; border-radius: 3px;
    }
    .state-watched { background: rgba(52,211,153,0.18); color: #34d399; }
    .state-watching { background: rgba(232,50,26,0.2); color: var(--red); }
    .state-plan { background: rgba(96,165,250,0.18); color: #60a5fa; }
    .anime-card-info { padding: 0.75rem; }
    .anime-card-name {
      font-family: var(--font-display); font-size: 1rem; letter-spacing: 1.5px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .anime-card-meta { font-size: 0.7rem; color: var(--muted); margin-top: 0.2rem; letter-spacing: 0.5px; }
    /* Remove button */
    .anime-card-remove {
      position: absolute; top: 8px; right: 8px;
      width: 26px; height: 26px; border-radius: 50%;
      background: rgba(8,8,16,0.85); border: 1px solid var(--border);
      color: var(--red); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.2s, background 0.2s, transform 0.2s;
      z-index: 5;
    }
    .anime-card:hover .anime-card-remove { opacity: 1; }
    .anime-card-remove:hover { background: var(--red); color: #fff; transform: scale(1.1); }
    /* Saved ribbon */
    .saved-ribbon {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, rgba(8,8,16,0.95) 0%, transparent 100%);
      padding: 1.5rem 0.75rem 0.5rem;
      display: flex; align-items: center; gap: 0.35rem;
      font-size: 0.6rem; color: var(--gold); letter-spacing: 1.5px; text-transform: uppercase;
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 50vh; text-align: center; gap: 1.5rem;
    }
    .empty-icon {
      width: 80px; height: 80px; border-radius: 50%;
      background: var(--surface); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
    }
    .empty-title { font-family: var(--font-display); font-size: 2.5rem; letter-spacing: 4px; color: var(--muted); }
    .empty-sub { font-size: 0.9rem; color: var(--muted); max-width: 360px; line-height: 1.7; }
    .empty-cta {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.75rem 2rem; background: var(--red); color: #fff;
      border-radius: 4px; font-family: var(--font-display); font-size: 1.1rem;
      letter-spacing: 2px; text-decoration: none; transition: background 0.2s, transform 0.2s;
    }
    .empty-cta:hover { background: #d02a14; transform: translateY(-2px); }

    /* ===== STATS BAR ===== */
    .stats-bar {
      display: flex; gap: 2rem; flex-wrap: wrap;
      padding: 1.5rem 2.5rem; border-bottom: 1px solid var(--border);
      max-width: 1400px; margin: 0 auto;
    }
    .stat-item { text-align: center; }
    .stat-num { font-family: var(--font-display); font-size: 1.8rem; color: var(--red); letter-spacing: 2px; line-height: 1; }
    .stat-label { font-size: 0.6rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 0.2rem; }

    /* ===== TOAST ===== */
    .toast { position: fixed; bottom: 2rem; right: 2rem; padding: 0.85rem 1.5rem; border-radius: 8px; font-size: 0.9rem; font-weight: 500; z-index: 9999; animation: toastIn 0.4s cubic-bezier(0.34,1.56,0.64,1); max-width: 340px; }
    .toast.success { background: rgba(52,211,153,0.15); border: 1px solid rgba(52,211,153,0.3); color: #34d399; }
    .toast.info { background: rgba(96,165,250,0.15); border: 1px solid rgba(96,165,250,0.3); color: #60a5fa; }
    .toast.error { background: rgba(232,50,26,0.15); border: 1px solid rgba(232,50,26,0.3); color: var(--red); }
    @keyframes toastIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  /* ═══════════════════════════════════════════════════
     SAVE.HTML — MOBILE APP REDESIGN (≤768px)
     ═══════════════════════════════════════════════════ */
  @media (max-width: 768px) {
    :root { --mob-nav-h: 56px; --mob-tab-h: 62px; --mob-safe: env(safe-area-inset-bottom, 0px); }

    /* ── Hide desktop nav entirely ── */
    nav { display: none !important; }

    /* ── Safe body padding for bottom tab bar ── */
    body { padding-bottom: calc(var(--mob-tab-h) + var(--mob-safe)); }

    /* ── MOBILE TOP BAR ── */
    #mob-top-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 500;
      height: var(--mob-nav-h);
      background: rgba(8,8,16,0.97); backdrop-filter: blur(24px) saturate(1.6);
      border-bottom: 1px solid rgba(232,50,26,0.15);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1rem;
    }
    #mob-top-bar .mob-logo {
      font-family: var(--font-display); font-size: 1.4rem; letter-spacing: 3px;
      color: var(--text); text-decoration: none;
    }
    #mob-top-bar .mob-logo span { color: var(--red); }
    #mob-top-bar .mob-top-right { display: flex; align-items: center; gap: 0.1rem; }
    .mob-icon-btn {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; color: var(--text); cursor: pointer;
      -webkit-tap-highlight-color: transparent; transition: background 0.15s;
    }
    .mob-icon-btn:active { background: rgba(255,255,255,0.08); }

    /* ── MOBILE BOTTOM TAB BAR ── */
    #mob-tab-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 500;
      height: calc(var(--mob-tab-h) + var(--mob-safe));
      padding-bottom: var(--mob-safe);
      background: rgba(8,8,16,0.98); backdrop-filter: blur(24px) saturate(1.6);
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: stretch;
    }
    .mob-tab {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 3px; background: none; border: none;
      color: var(--muted); font-family: var(--font-body); font-size: 0.58rem;
      letter-spacing: 0.5px; text-transform: uppercase; cursor: pointer;
      text-decoration: none; padding: 0 0 2px;
      -webkit-tap-highlight-color: transparent; transition: color 0.2s;
    }
    .mob-tab svg { transition: transform 0.18s; }
    .mob-tab:active svg { transform: scale(0.85); }
    .mob-tab.active { color: var(--red); }
    .mob-tab.active svg { filter: drop-shadow(0 0 5px rgba(232,50,26,0.65)); }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: calc(var(--mob-nav-h) + 1.25rem) 1rem 1.25rem !important;
      background: radial-gradient(ellipse 100% 60% at 50% 0%, rgba(232,50,26,0.1) 0%, transparent 70%);
    }
    .page-header-eyebrow { font-size: 0.65rem; letter-spacing: 3px; margin-bottom: 0.5rem; }
    .page-header-title { font-size: clamp(2.8rem, 14vw, 4rem); letter-spacing: 4px; }
    .page-header-meta { font-size: 0.72rem; margin-top: 0.5rem; }
    .page-header-top { flex-direction: row; align-items: center; gap: 0.75rem; }
    .clear-all-btn { padding: 0.4rem 0.9rem; font-size: 0.65rem; letter-spacing: 1px; white-space: nowrap; }

    /* ── STATS BAR — horizontal scroll, app-style chips ── */
    .stats-bar {
      padding: 0.875rem 1rem !important;
      gap: 0 !important;
      display: grid !important;
      grid-template-columns: repeat(4, 1fr);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin: 0 1rem 0 !important;
      overflow: hidden;
    }
    .stat-item {
      padding: 0.7rem 0.25rem;
      border-right: 1px solid var(--border);
      text-align: center;
    }
    .stat-item:last-child { border-right: none; }
    .stat-num { font-size: 1.5rem; }
    .stat-label { font-size: 0.48rem; letter-spacing: 1px; margin-top: 0.1rem; }

    /* ── FILTERS BAR ── */
    .filters-bar {
      padding: 0.875rem 1rem 0 !important;
      flex-wrap: nowrap; align-items: center; gap: 0.5rem;
    }
    .filter-tabs {
      flex-wrap: nowrap; overflow-x: auto; gap: 0.35rem;
      scrollbar-width: none; padding-bottom: 0;
      flex: 1; min-width: 0;
    }
    .filter-tabs::-webkit-scrollbar { display: none; }
    .filter-tab {
      flex-shrink: 0; padding: 0.3rem 0.85rem;
      font-size: 0.65rem; border-radius: 20px; letter-spacing: 0.8px;
    }
    .sort-select {
      flex-shrink: 0; font-size: 0.65rem; padding: 0.3rem 0.5rem;
      border-radius: 6px; max-width: 110px;
    }

    /* ── GRID — 3 columns ── */
    .saved-grid-wrap { padding: 0.875rem 1rem 1.5rem !important; }
    .saved-grid { grid-template-columns: repeat(3, 1fr) !important; gap: 0.5rem !important; }
    .anime-card-info { padding: 0.5rem; }
    .anime-card-name { font-size: 0.78rem; letter-spacing: 0.8px; }
    .anime-card-meta { font-size: 0.55rem; }
    .anime-card-state { font-size: 0.46rem; padding: 2px 5px; }
    /* Remove button always visible on mobile (no hover) */
    .anime-card-remove { opacity: 1 !important; width: 24px; height: 24px; }
    .anime-card:active { transform: scale(0.97); border-color: rgba(232,50,26,0.4); }
    .saved-ribbon { font-size: 0.52rem; padding: 1rem 0.5rem 0.35rem; }

    /* ── EMPTY STATE ── */
    .empty-state { min-height: 40vh; gap: 1rem; }
    .empty-icon { width: 60px; height: 60px; }
    .empty-title { font-size: 1.8rem; letter-spacing: 3px; }
    .empty-sub { font-size: 0.8rem; max-width: 280px; }
    .empty-cta { padding: 0.65rem 1.5rem; font-size: 0.95rem; letter-spacing: 1.5px; }

    /* ── SEARCH OVERLAY — full index-style ── */
    #search-overlay {
      padding-top: 0;
      align-items: stretch;
    }
    #search-overlay.active {
      display: flex; flex-direction: column;
    }
    /* Sticky search input bar at top */
    #search-overlay .search-box {
      position: sticky; top: 0; z-index: 10;
      padding: var(--mob-nav-h) 1rem 0;
      background: rgba(8,8,16,0.98); backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(232,50,26,0.2);
      flex-shrink: 0;
    }
    #search-overlay .search-input-wrap {
      padding-bottom: 0.65rem; margin-bottom: 0;
      gap: 0.75rem;
    }
    #search-overlay .search-input-wrap svg { width: 20px; height: 20px; }
    #search-overlay .search-main-input {
      font-size: 1.65rem; letter-spacing: 2px;
    }
    /* Big tap-friendly close button */
    #search-overlay .search-close {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.07); font-size: 1rem;
      flex-shrink: 0;
    }
    #search-overlay .search-close:active { background: rgba(255,255,255,0.14); }
    /* Results list scrollable below */
    #search-results {
      padding: 0.875rem 1rem 2rem;
      flex: 1; overflow-y: auto;
    }
    .search-result-item {
      gap: 0.75rem; padding: 0.65rem 0.75rem; border-radius: 8px;
    }
    .search-result-item:active { border-color: var(--red); background: var(--surface2); }
    .search-result-item img { width: 36px; height: 54px; border-radius: 4px; }
    .search-result-name { font-size: 0.95rem; letter-spacing: 1px; }
    .search-result-meta { font-size: 0.65rem; }
    /* Empty/hint state */
    .search-hint {
      text-align: center; color: var(--muted); font-size: 0.78rem;
      letter-spacing: 1.5px; padding: 3rem 1rem;
    }

    /* ── TOAST — above tab bar ── */
    .toast {
      bottom: calc(var(--mob-tab-h) + var(--mob-safe) + 0.6rem);
      right: 0.875rem; left: 0.875rem; max-width: none; text-align: center;
    }

    /* ── FOOTER — minimal ── */
    footer { padding: 1.5rem 1rem !important; flex-direction: column; gap: 0.75rem; }
    .footer-logo { font-size: 1rem; }
    .footer-copy { font-size: 0.62rem; }
  }

  @media (max-width: 375px) {
    .saved-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .stats-bar { grid-template-columns: repeat(2, 1fr) !important; }
    .stat-item:nth-child(2) { border-right: none; }
    .stat-item:nth-child(3) { border-top: 1px solid var(--border); }
    .stat-item:nth-child(4) { border-top: 1px solid var(--border); }
    .mob-tab span { display: none; }
  }

    /* ===== FOOTER ===== */
    footer {
      border-top: 1px solid var(--border); padding: 2.5rem 2.5rem;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 1rem;
    }
    .footer-logo { font-family: var(--font-display); font-size: 1.4rem; letter-spacing: 3px; color: var(--muted); display: flex; align-items: center; gap: 0.5rem; text-decoration: none; }
    .footer-logo img { height: 24px; opacity: 0.5; }
    .footer-logo span { color: var(--red); }
    .footer-copy { font-size: 0.7rem; color: var(--muted); }

    /* ===== NAV SEARCH (exact match to index.html) ===== */
    .nav-links { display: flex; gap: 1.5rem; align-items: center; }
    .nav-links a {
      color: var(--muted); text-decoration: none; font-size: 0.8rem;
      font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; transition: color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--text); }
    .nav-search {
      display: flex; align-items: center; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 0 0.75rem; gap: 0.5rem; transition: border-color 0.2s;
    }
    .nav-search:focus-within { border-color: var(--red); }
    .nav-search input {
      background: transparent; border: none; outline: none;
      color: var(--text); font-size: 0.85rem; font-family: var(--font-body);
      width: 180px; padding: 0.5rem 0;
    }
    .nav-search input::placeholder { color: var(--muted); }
    .nav-search svg { color: var(--muted); flex-shrink: 0; }
    /* Save/bookmark button — styled like index nav-user-btn */
    .nav-user-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--surface2); border: 1px solid var(--border);
      cursor: pointer; overflow: hidden; flex-shrink: 0;
      transition: border-color 0.2s; display: flex; align-items: center; justify-content: center;
    }
    .nav-user-btn:hover { border-color: var(--red); }
    .nav-user-btn svg { color: var(--muted); }
    /* mobile search button */
    .nav-mobile-search-btn {
      display: none; background: none; border: none; color: var(--text);
      cursor: pointer; padding: 4px; align-items: center; justify-content: center;
    }

    /* ===== SEARCH OVERLAY (exact match to index.html) ===== */
    #search-overlay {
      position: fixed; inset: 0; background: rgba(8,8,16,0.96);
      backdrop-filter: blur(20px); z-index: 900; display: none;
      flex-direction: column; align-items: center; padding-top: 12vh;
      overflow-y: auto;
    }
    #search-overlay.active { display: flex; }
    body.search-open { overflow: hidden; }
    .search-box { width: 100%; max-width: 680px; padding: 0 2rem; flex-shrink: 0; }
    .search-input-wrap {
      display: flex; align-items: center; gap: 1rem;
      border-bottom: 2px solid var(--red); padding-bottom: 0.75rem; margin-bottom: 2rem;
    }
    .search-input-wrap svg { color: var(--red); flex-shrink: 0; width: 24px; height: 24px; }
    .search-main-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-family: var(--font-display);
      font-size: 2.5rem; letter-spacing: 3px;
    }
    .search-main-input::placeholder { color: var(--muted); }
    .search-close { background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 1.5rem; }
    .search-close:hover { color: var(--text); }
    #search-results { width: 100%; max-width: 680px; padding: 0 2rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .search-result-item {
      display: flex; align-items: center; gap: 1rem; padding: 0.75rem;
      border-radius: 6px; background: var(--surface); border: 1px solid var(--border);
      text-decoration: none; color: var(--text); cursor: pointer; transition: border-color 0.2s;
    }
    .search-result-item:hover { border-color: var(--red); }
    .search-result-item img { width: 40px; height: 60px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
    .search-result-name { font-family: var(--font-display); font-size: 1.1rem; letter-spacing: 1.5px; }
    .search-result-meta { font-size: 0.75rem; color: var(--muted); margin-top: 0.2rem; }
    .search-label-tag {
      font-size: 0.6rem; letter-spacing: 1.5px; text-transform: uppercase;
      padding: 2px 6px; border-radius: 3px; background: rgba(232,50,26,0.15);
      color: var(--red); flex-shrink: 0;
    }

    /* ===== RESPONSIVE NAV (exact match to index.html) ===== */
    @media (max-width: 1024px) { nav { padding: 0 1.5rem; } }
    @media (max-width: 768px) {
      nav { padding: 0 1rem; }
      .nav-search { display: none; }
      .nav-links { display: none; }
      .nav-links.open {
        display: flex !important;
        flex-direction: column;
        position: fixed; top: 64px; left: 0; right: 0;
        background: rgba(8,8,16,0.98);
        padding: 1.5rem; gap: 1.5rem;
        border-bottom: 1px solid var(--border);
        z-index: 490;
        box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      }
      .nav-links.open a {
        font-family: var(--font-display); font-size: 1.2rem;
        letter-spacing: 3px; color: var(--muted);
        text-decoration: none; padding: 0.5rem 0;
        border-bottom: 1px solid var(--border);
        transition: color 0.2s;
      }
      .nav-links.open a:last-child { border-bottom: none; }
      .nav-links.open a:hover, .nav-links.open a.active { color: var(--red); }
      .nav-hamburger { display: block; }
      .nav-mobile-search-btn { display: flex; }
      .page-header { padding: 100px 1.25rem 2rem; }
      .filters-bar { padding: 1.5rem 1.25rem 0; }
      .saved-grid-wrap { padding: 1.5rem 1.25rem 4rem; }
      .stats-bar { padding: 1.25rem; gap: 1.25rem; }
      footer { padding: 2rem 1.25rem; }
    }
  </style>
</head>

<script>
  // Show mobile UI only on mobile
  if (window.innerWidth <= 768) {
    document.getElementById('mob-top-bar').style.display = 'flex';
    document.getElementById('mob-tab-bar').style.display = 'flex';
  }

  // Tab filter shortcut used by bottom tab bar
  window.setFilter = function(filter) {
    document.querySelectorAll('#filter-tabs .filter-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.filter === filter);
    });
    if (typeof applyFilters === 'function') applyFilters();
    // Sync tab bar active state
    syncTabBar(filter);
  };

  function syncTabBar(filter) {
    const map = { all: 1, watched: 2, watching: 3, plan: 4 };
    document.querySelectorAll('#mob-tab-bar .mob-tab').forEach((t, i) => {
      t.classList.toggle('active', i === (map[filter] ?? 1));
    });
  }

  // Sync clear button visibility with desktop clear-all-btn
  const _clearObserver = new MutationObserver(() => {
    const desktop = document.getElementById('clear-all-btn');
    const mob = document.getElementById('mob-clear-btn');
    if (desktop && mob) mob.style.display = desktop.style.display === 'none' ? 'none' : 'flex';
  });
  const _clearTarget = document.getElementById('clear-all-btn');
  if (_clearTarget) _clearObserver.observe(_clearTarget, { attributes: true, attributeFilter: ['style'] });
</script>

<script>
  const SAVE_KEY = 'anivalted_saved';
  const TEAR_ORDER = ['SSS','SS','S','A+','A','B+','B','C','D','E','F+','F','F-'];

  let ALL_ANIME = [];
  let savedIds = [];
  let currentFilter = 'all';

  function getSavedIds() {
    try { return JSON.parse(localStorage.getItem(SAVE_KEY) || '[]'); } catch(e) { return []; }
  }
  function setSavedIds(ids) {
    try { localStorage.setItem(SAVE_KEY, JSON.stringify(ids)); } catch(e) {}
  }

  function getStateLabel(s) { return { watched:'AVAILABLE', watching:'RUNNING', plan:'UPCOMING' }[s] || (s ? s.toUpperCase() : ''); }
  function getStateClass(s) { return { watched:'state-watched', watching:'state-watching', plan:'state-plan' }[s] || 'state-watched'; }

  function showToast(msg, type = 'info') {
    const ex = document.querySelector('.toast'); if (ex) ex.remove();
    const t = document.createElement('div');
    t.className = `toast ${type}`; t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.style.opacity = '0', 2800);
    setTimeout(() => t.remove(), 3300);
  }

  function animateCount(el, target) {
    let start = null;
    const step = ts => {
      if (!start) start = ts;
      const p = Math.min((ts - start) / 700, 1);
      el.textContent = Math.floor(p * target);
      if (p < 1) requestAnimationFrame(step);
      else el.textContent = target;
    };
    requestAnimationFrame(step);
  }

  function updateStats(animes) {
    animateCount(document.getElementById('stat-total'), animes.length);
    animateCount(document.getElementById('stat-watched'), animes.filter(a=>a.state==='watched').length);
    animateCount(document.getElementById('stat-watching'), animes.filter(a=>a.state==='watching').length);
    animateCount(document.getElementById('stat-plan'), animes.filter(a=>a.state==='plan').length);
  }

  function removeAnime(animeId) {
    savedIds = savedIds.filter(id => String(id) !== String(animeId));
    setSavedIds(savedIds);
    showToast('Removed from saved', 'info');
    applyFilters();
    updateHeaderMeta();
  }

  function clearAll() {
    if (!confirm('Remove all saved anime? This cannot be undone.')) return;
    savedIds = [];
    setSavedIds([]);
    showToast('All saved anime cleared', 'info');
    render([]);
    updateHeaderMeta();
  }

  function updateHeaderMeta() {
    const total = savedIds.length;
    const el = document.getElementById('header-meta');
    el.textContent = total === 0
      ? 'Your collection is empty — start saving anime from the main library!'
      : `${total} anime saved in your personal collection`;
    document.getElementById('clear-all-btn').style.display = total ? '' : 'none';
    document.getElementById('stats-bar').style.display = total ? '' : 'none';
    document.getElementById('filters-bar').style.display = total ? '' : 'none';
  }

  function makeCard(anime) {
    const card = document.createElement('a');
    card.className = 'anime-card';
    card.href = `anime.html?id=${anime.id}`;
    card.innerHTML = `
      <div class="anime-card-img-wrap">
        <img src="${anime.image}" alt="${anime.name}" loading="lazy"
          onerror="this.src='https://via.placeholder.com/300x450/14141f/e8321a?text=${encodeURIComponent(anime.name[0])}'" />
        <div class="${getStateClass(anime.state)} anime-card-state">${getStateLabel(anime.state)}</div>
        <div class="saved-ribbon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" width="10" height="10"><path stroke-linecap="round" stroke-linejoin="round" d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0111.186 0z"/></svg>
          Saved
        </div>
        <button class="anime-card-remove" onclick="event.preventDefault();event.stopPropagation();removeAnime('${anime.id}')" title="Remove from saved">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="13" height="13"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="anime-card-info">
        <div class="anime-card-name">${anime.name}</div>
        <div class="anime-card-meta">${anime.tear} Tier · ${anime.rating ?? '?'}/10</div>
      </div>`;
    return card;
  }

  function render(animes) {
    const grid = document.getElementById('saved-grid');
    grid.innerHTML = '';
    if (!animes.length) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <div class="empty-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="36" height="36"><path stroke-linecap="round" stroke-linejoin="round" d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0111.186 0z"/></svg>
          </div>
          <p class="empty-title">NO ANIME HERE</p>
          <p class="empty-sub">${currentFilter !== 'all' ? 'No saved anime match this filter.' : 'Tap the bookmark icon on any anime card to save it here.'}</p>
          <a class="empty-cta" href="index.html">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/></svg>
            EXPLORE LIBRARY
          </a>
        </div>`;
      return;
    }
    animes.forEach(anime => grid.appendChild(makeCard(anime)));
    updateStats(animes);
  }

  function applyFilters() {
    currentFilter = document.querySelector('.filter-tab.active')?.dataset.filter || 'all';
    const sort = document.getElementById('sort-select')?.value || 'saved';
    const savedStrIds = savedIds.map(id => String(id));

    let animes = ALL_ANIME.filter(a => savedStrIds.includes(String(a.id)));

    if (currentFilter !== 'all') animes = animes.filter(a => a.state === currentFilter);

    if (sort === 'name') {
      animes.sort((a, b) => a.name.localeCompare(b.name));
    } else if (sort === 'rating') {
      animes.sort((a, b) => (b.rating ?? 0) - (a.rating ?? 0));
    } else if (sort === 'tier') {
      animes.sort((a, b) => TEAR_ORDER.indexOf(a.tear) - TEAR_ORDER.indexOf(b.tear));
    } else {
      animes.sort((a, b) => savedStrIds.indexOf(String(a.id)) - savedStrIds.indexOf(String(b.id)));
    }

    render(animes);
    updateStats(ALL_ANIME.filter(a => savedStrIds.includes(String(a.id))));
  }

  // Filter tab click
  document.getElementById('filter-tabs').addEventListener('click', e => {
    const tab = e.target.closest('.filter-tab');
    if (!tab) return;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    applyFilters();
  });

  // ===== GO BACK =====
  function goBack() {
    if (window.history.length > 1) {
      window.history.back();
    } else {
      window.location.href = 'index.html';
    }
  }

  // ===== SEARCH (saved library only) =====
  function openSearch() {
    document.getElementById('search-overlay').classList.add('active');
    // Show hint, hide when user types
    const hint = document.getElementById('search-hint');
    const inp = document.getElementById('search-main-input');
    if (hint && inp) {
      hint.style.display = inp.value.trim() ? 'none' : 'block';
    }
    document.body.classList.add('search-open');
    setTimeout(() => document.getElementById('search-main-input').focus(), 100);
  }

  function setupSearch() {
    const overlay = document.getElementById('search-overlay');
    const mainInput = document.getElementById('search-main-input');
    const results = document.getElementById('search-results');

    function close() {
      overlay.classList.remove('active');
      document.body.classList.remove('search-open');
      mainInput.value = '';
      results.innerHTML = '';
    }

    document.getElementById('close-search').addEventListener('click', close);

    overlay.addEventListener('click', e => { if (e.target === overlay) close(); });

    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); openSearch(); }
      if (e.key === 'Escape' && overlay.classList.contains('active')) close();
    });

    mainInput.addEventListener('input', () => {
      const q = mainInput.value.trim().toLowerCase();
      const hint = document.getElementById('search-hint');
      if (hint) hint.style.display = q ? 'none' : 'block';
      results.innerHTML = '';
      if (!q) return;

      // Normalize savedIds to strings for reliable comparison
      const savedStrIds = savedIds.map(id => String(id));

      // Only search within saved anime — match by string id
      const savedAnimes = ALL_ANIME.filter(a => savedStrIds.includes(String(a.id)));

      const matches = savedAnimes.filter(a => {
        try {
          if (a.name && a.name.toLowerCase().includes(q)) return true;
          if (a.altName && a.altName.toLowerCase().includes(q)) return true;
          // genre can be an array or a string
          if (a.genre) {
            const genreStr = Array.isArray(a.genre) ? a.genre.join(' ') : a.genre;
            if (genreStr.toLowerCase().includes(q)) return true;
          }
          if (a.tear && a.tear.toLowerCase().includes(q)) return true;
          return false;
        } catch(e) { return false; }
      }).slice(0, 8);

      if (!matches.length) {
        results.innerHTML = `<p style="color:var(--muted);text-align:center;font-size:0.9rem;padding:2rem 0">No saved anime match "<strong style="color:var(--text)">${q}</strong>"</p>`;
        return;
      }

      matches.forEach(anime => {
        const item = document.createElement('a');
        item.className = 'search-result-item';
        item.href = `anime.html?id=${anime.id}`;
        item.innerHTML = `
          <img src="${anime.image}" alt="${anime.name}" onerror="this.src='https://via.placeholder.com/40x60/14141f/e8321a?text=${encodeURIComponent(anime.name[0])}'"/>
          <div style="flex:1;min-width:0">
            <div class="search-result-name">${anime.name}</div>
            <div class="search-result-meta">${anime.tear} Tier · ${anime.rating ?? '?'}/10 · ${getStateLabel(anime.state)}</div>
          </div>
          <span class="search-label-tag">SAVED</span>`;
        results.appendChild(item);
      });
    });
  }

  // Nav hamburger — toggles mobile nav-links dropdown
  function toggleMenu() {
    const links = document.getElementById('nav-links');
    const isOpen = links.classList.toggle('open');
    document.getElementById('nav-hamburger').innerHTML = isOpen
      ? `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>`
      : `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg>`;
  }
  document.addEventListener('click', e => {
    const links = document.getElementById('nav-links');
    const burger = document.getElementById('nav-hamburger');
    if (links && links.classList.contains('open') && !links.contains(e.target) && !burger.contains(e.target)) {
      links.classList.remove('open');
      burger.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg>`;
    }
  });

  // ===== INIT =====
  async function init() {
    savedIds = getSavedIds();
    ALL_ANIME = await loadAnimeData();

    updateHeaderMeta();
    applyFilters();
    setupSearch();
  }

  // ===== BLOCK RIGHT CLICK =====
  document.addEventListener('contextmenu', e => e.preventDefault());

  init();
</script>
<script src="miniplayer.js"></script>
</body>
</html>
