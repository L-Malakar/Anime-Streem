  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none}
    input,textarea,select{-webkit-user-select:text;-moz-user-select:text;-ms-user-select:text;user-select:text}
    body{font-family:'Outfit',sans-serif;background:#0a0a0a;color:#f0f0f0;overflow-x:hidden}
    ::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:#0a0a0a}::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:4px}::-webkit-scrollbar-thumb:hover{background:#3a3a3a}

    .bg-orb{position:fixed;border-radius:50%;filter:blur(100px);opacity:0.08;pointer-events:none;z-index:0}
    .bg-orb-1{width:400px;height:400px;background:#e63946;top:-100px;left:-100px;animation:orbF1 22s ease-in-out infinite}
    .bg-orb-2{width:350px;height:350px;background:#ff6b6b;bottom:-80px;right:-80px;animation:orbF2 28s ease-in-out infinite}
    @keyframes orbF1{0%,100%{transform:translate(0,0)}50%{transform:translate(80px,100px)}}
    @keyframes orbF2{0%,100%{transform:translate(0,0)}50%{transform:translate(-60px,-80px)}}
    @media(prefers-reduced-motion:reduce){.bg-orb{animation:none!important}}

    .video-wrap{position:relative;background:#000;border-radius:12px;overflow:hidden;aspect-ratio:16/9;box-shadow:0 0 0 1px rgba(255,255,255,0.04),0 20px 60px -15px rgba(0,0,0,0.6)}
    .video-wrap video{width:100%;height:100%;display:block}
    .video-wrap .controls-overlay{position:absolute;bottom:0;left:0;right:0;padding:14px 18px;background:linear-gradient(to top,rgba(0,0,0,0.9) 0%,rgba(0,0,0,0.4) 60%,transparent 100%);opacity:0;transition:opacity 0.3s ease;display:flex;flex-direction:column;gap:8px}
    .video-wrap:hover .controls-overlay,.video-wrap.show-controls .controls-overlay{opacity:1}
    .video-wrap .big-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.35);cursor:pointer;transition:opacity 0.25s}
    .video-wrap .big-play.hidden{opacity:0;pointer-events:none}
    .big-play-circle{width:64px;height:64px;border-radius:50%;background:rgba(230,57,70,0.92);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 30px rgba(230,57,70,0.4);transition:transform 0.2s}
    .big-play:hover .big-play-circle{transform:scale(1.08)}
    .big-play:active .big-play-circle{transform:scale(0.95)}

    .progress-bar{width:100%;height:4px;background:rgba(255,255,255,0.12);border-radius:99px;cursor:pointer;position:relative;transition:height 0.15s}
    .progress-bar:hover{height:7px}
    .progress-fill{height:100%;background:linear-gradient(90deg,#e63946,#ff6b6b);border-radius:99px;position:relative;pointer-events:none}
    .progress-fill::after{content:'';position:absolute;right:-7px;top:50%;transform:translateY(-50%) scale(0);width:14px;height:14px;background:#fff;border-radius:50%;box-shadow:0 0 6px rgba(0,0,0,0.5);transition:transform 0.15s}
    .progress-bar:hover .progress-fill::after{transform:translateY(-50%) scale(1)}
    .progress-buffer{position:absolute;top:0;left:0;height:100%;background:rgba(255,255,255,0.1);border-radius:99px;pointer-events:none}

    .ep-item{transition:all 0.2s ease;border:1px solid transparent}
    .ep-item:hover{background:#1e1e1e;border-color:#333}
    .ep-item.active{background:rgba(230,57,70,0.1);border-color:rgba(230,57,70,0.35)}
    .ep-item.watched .ep-num{background:rgba(34,197,94,0.15);color:#22c55e}
    .ep-item.current .ep-num{background:rgba(230,57,70,0.2);color:#e63946}
    .ep-num{width:32px;height:32px;border-radius:8px;background:#1a1a1a;color:#8a8a8a;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:all 0.2s;flex-shrink:0}
    .ep-item:hover .ep-num{background:rgba(230,57,70,0.15);color:#ff6b6b}
    .ep-current-dot{width:6px;height:6px;border-radius:50%;background:#e63946;animation:dotPulse 1.5s ease-in-out infinite;flex-shrink:0}

    .mep-card{transition:all 0.2s ease;border:1px solid transparent}
    .mep-card:hover{border-color:rgba(230,57,70,0.3)}
    .mep-card.active{background:rgba(230,57,70,0.1);border-color:rgba(230,57,70,0.4)}
    .mep-card.watched .mep-num{color:#22c55e}

    .toast{animation:slideIn 0.3s ease forwards}

    .toast-out{animation:slideOut 0.3s ease forwards}

    .fade-in{animation:fadeIn 0.4s ease forwards}

    .glow-line{height:2px;background:linear-gradient(90deg,transparent,#e63946,transparent);animation:glowPulse 3s ease infinite}

    .back-btn{transition:all 0.2s ease}
    .back-btn:hover{background:rgba(255,255,255,0.06)}
    .back-btn:active{transform:scale(0.92)}

    #aw-miniplayer #aw-mp-bar{height:100%;background:#e63946;transition:width 0.3s ease;width:0}

  <div class="bg-orb bg-orb-2"></div>

  <!-- Nav -->
  <nav class="fixed top-0 left-0 right-0 z-[1000] bg-aw-bg/90 backdrop-blur-xl border-b border-aw-border">
    <div class="max-w-[1600px] mx-auto px-4 sm:px-6 h-14 flex items-center gap-3">
      <button onclick="history.back()" class="back-btn w-9 h-9 flex items-center justify-center rounded-full shrink-0" title="Go back">

  <!-- Main -->

          <div class="glow-line mb-5"></div>
          <div class="flex items-start justify-between gap-4 mb-3">

  <script>
    /* Security — restricted to the video player only, rest of the page is normal to use */
    function inPlayerZone(e) {
      const wrap = document.getElementById('videoWrap');
      return !!(wrap && e.target && wrap.contains(e.target));
    }
    document.addEventListener('contextmenu', e => { if (inPlayerZone(e)) e.preventDefault(); });
    document.addEventListener('copy', e => {
      if (inPlayerZone(e) && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') e.preventDefault();
    });
    document.addEventListener('selectstart', e => {
      if (!inPlayerZone(e)) return;
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
      e.preventDefault();
    });
    document.addEventListener('dragstart', e => { if (inPlayerZone(e)) e.preventDefault(); });

    /* Escape any string before inserting it as HTML — protects against a malformed/compromised details.json */
    function escapeHtml(str) {
      if (str === undefined || str === null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    /* Toast */
    function showToast(msg, type = 'info') {
      const c = document.getElementById('toastContainer');
      const existing = c.querySelectorAll('.toast:not(.toast-out)');
      if (existing.length >= 3) existing[0].remove();
      const t = document.createElement('div');
      const icons = { info: 'fa-circle-info', success: 'fa-circle-check', error: 'fa-circle-xmark' };
      const colors = { info: 'border-aw-accent', success: 'border-green-500', error: 'border-red-500' };
      t.className = `toast border-l-4 ${colors[type] || colors.info} bg-aw-card rounded-lg px-4 py-3 text-sm text-aw-fg shadow-2xl max-w-xs flex items-center gap-3`;
      t.innerHTML = `<i class="fas ${icons[type] || icons.info} ${type === 'success' ? 'text-green-500' : type === 'error' ? 'text-red-500' : 'text-aw-accent'} text-base shrink-0"></i><span>${msg}</span>`;
      c.appendChild(t);
      setTimeout(() => { t.classList.add('toast-out'); setTimeout(() => t.remove(), 300); }, 2800);
    }

    function fmt(s) { if (!s || isNaN(s)) return '0:00'; const m = Math.floor(s / 60), sec = Math.floor(s % 60); return m + ':' + (sec < 10 ? '0' : '') + sec; }

    /* Saved */
    function getSaved() { try { return JSON.parse(localStorage.getItem('aw_saved') || '[]'); } catch { return []; } }
    function isSaved(id) { return getSaved().includes(id); }
    function toggleSave(id, name) {
      let s = getSaved();
      if (s.includes(id)) { s = s.filter(x => x !== id); showToast(`Removed "${name}"`, 'info'); }
      else { s.push(id); showToast(`Saved "${name}"`, 'success'); }
      localStorage.setItem('aw_saved', JSON.stringify(s));
      return s.includes(id);
    }

    /* Watch History */
    function addToHistory(id, season, episode) {
      try {
        let h = JSON.parse(localStorage.getItem('aw_history') || '[]');
        h = h.filter(x => x.id !== id);
        h.unshift({ id, ts: Date.now(), s: season || 1, e: episode || 1 });
        if (h.length > 50) h = h.slice(0, 50);
        localStorage.setItem('aw_history', JSON.stringify(h));
      } catch (e) {}
    }

    /* Progress — per season */
    function getProgress(animeId, s) {
      try { return parseInt(localStorage.getItem('aw_prog_' + animeId + '_s' + s) || '0'); } catch { return 0; }
    }
    function setProgress(animeId, epNum, s) {
      const key = 'aw_prog_' + animeId + '_s' + s;
      try {
        const prev = parseInt(localStorage.getItem(key) || '0');
        if (epNum > prev) localStorage.setItem(key, String(epNum));
      } catch (e) { }
    }

    /* Data */
    let allAnime = [];

    let anime = null, videoUrl = '';
    /* playSeason/playEp = what is currently playing (loaded in the video player) */
    let playSeason = 1, playEp = 1;
    /* viewSeason = which season's episodes are shown in the sidebar */
    let viewSeason = 1;
    let hlsInstance = null, saveTimer = null, controlsTimeout = null;
    let seasonDrawerOpen = { desktop: false, mobile: false };
    let channel = null;
    try { channel = new BroadcastChannel('aw_player_sync'); } catch (e) { }

    function broadcastState(action) {
      if (!channel || !anime) return;
      const v = document.getElementById('mainVideo');
      channel.postMessage({
        type: action, state: {
          active: action !== 'stop', animeId: anime.id, animeName: anime.name,
          animeImage: anime.image, season: playSeason, episode: playEp,
          videoUrl: videoUrl, currentTime: v ? v.currentTime : 0, duration: v ? v.duration : 0
        }
      });
    }

    /* ── Season Drawer ── */
    function toggleSeasonDrawer(prefix) {
      seasonDrawerOpen[prefix] = !seasonDrawerOpen[prefix];
      const panel = document.getElementById('seasonDrawerPanel' + capitalize(prefix));
      const chevron = document.getElementById('seasonDrawerChevron' + capitalize(prefix));
      if (seasonDrawerOpen[prefix]) {
        panel.classList.add('open');
        chevron.style.transform = 'rotate(180deg)';
      } else {
        panel.classList.remove('open');
        chevron.style.transform = 'rotate(0deg)';
      }
    }
    function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

    function renderSeasonDrawer() {
      const keys = getSeasonKeys();
      const hasMultiple = keys.length > 1;

      /* Build option HTML (shared for desktop & mobile) */
      function buildOptions() {
        return keys.map(sk => {
          const num = parseInt(sk.replace('s', ''));
          const count = Object.keys(anime.episodeLinks[sk]).length;
          const isViewing = num === viewSeason;
          const isPlaying = num === playSeason;
          let activeClass = isViewing ? 'active font-semibold' : 'text-aw-muted';
          let playingBadge = '';
          if (isPlaying && !isViewing) {
            playingBadge = '<span class="playing-season-badge">Now Playing</span>';
          }
          return `<button class="season-option w-full flex items-center justify-between px-4 py-2.5 text-sm ${activeClass}" onclick="switchViewSeason(${num})">
            <span class="flex items-center">Season ${num}${playingBadge}</span>
            <span class="text-xs ${isViewing ? 'text-aw-accent' : 'text-aw-border'}">${count} ep${count !== 1 ? 's' : ''}</span>
          </button>`;
        }).join('');
      }

      /* Desktop */
      const dd = document.getElementById('seasonDrawerDesktop');
      if (dd) {
        dd.style.display = hasMultiple ? 'block' : 'none';
        if (hasMultiple) {
          const label = 'Season ' + viewSeason + (viewSeason !== playSeason ? ' (Playing S' + playSeason + ')' : '');
          document.getElementById('seasonDrawerLabelDesktop').textContent = label;
          document.getElementById('seasonDrawerOptionsDesktop').innerHTML = buildOptions();
        }
      }

      /* Mobile */
      const dm = document.getElementById('seasonDrawerMobile');
      if (dm) {
        dm.style.display = hasMultiple ? 'block' : 'none';
        if (hasMultiple) {
          const label = 'Season ' + viewSeason + (viewSeason !== playSeason ? ' (Playing S' + playSeason + ')' : '');
          document.getElementById('seasonDrawerLabelMobile').textContent = label;
          document.getElementById('seasonDrawerOptionsMobile').innerHTML = buildOptions();
        }
      }

      /* Reset drawer open state */
      seasonDrawerOpen = { desktop: false, mobile: false };
      ['Desktop', 'Mobile'].forEach(p => {
        const panel = document.getElementById('seasonDrawerPanel' + p);
        const chevron = document.getElementById('seasonDrawerChevron' + p);
        if (panel) panel.classList.remove('open');
        if (chevron) chevron.style.transform = 'rotate(0deg)';
      });
    }

    async function loadData() {
      try {
        const res = await fetch('details.json');
        if (!res.ok) throw new Error();
        allAnime = await res.json();
        if (!Array.isArray(allAnime)) allAnime = [allAnime];
      } catch (e) {
        try {
          const demo = await fetch('demo.json');
          if (!demo.ok) throw new Error();
          allAnime = await demo.json();
          if (!Array.isArray(allAnime)) allAnime = [allAnime];
          showToast('details.json not found — showing demo data', 'info');
        } catch { allAnime = []; showToast('Could not load anime data', 'error'); }
      }
      initPlayer();
    }

    function getSeasonKeys() {
      if (!anime || !anime.episodeLinks) return [];
      return Object.keys(anime.episodeLinks).filter(sk => {
        const eps = anime.episodeLinks[sk];
        return eps && typeof eps === 'object' && Object.keys(eps).length > 0;
      });
    }

    function getSortedEpNums(s) {
      const sk = 's' + s;
      const eps = anime.episodeLinks && anime.episodeLinks[sk] ? anime.episodeLinks[sk] : {};
      return Object.keys(eps).map(k => parseInt(k.replace('e', ''))).sort((a, b) => a - b);
    }

    function initPlayer() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const s = parseInt(params.get('s') || '1');
      const e = parseInt(params.get('e') || '1');
      anime = allAnime.find(a => a.id === id);
      if (!anime) { window.location.href = 'index.html'; return; }

      /* Both play and view start at the URL season/episode */
      playSeason = s;
      playEp = e;
      viewSeason = s;

      const sk = 's' + playSeason;
      const ek = 'e' + playEp;
      videoUrl = (anime.episodeLinks && anime.episodeLinks[sk] && anime.episodeLinks[sk][ek]) || '';

      const pageTitleText = `${anime.name} S${playSeason}E${playEp} — AnimeWave`;
      document.title = pageTitleText;
      document.getElementById('navTitle').textContent = `${anime.name} · Season ${playSeason} · Episode ${playEp}`;
      document.getElementById('epTitle').textContent = `Season ${playSeason} · Episode ${playEp}`;

      /* SEO / social preview tags — updated per anime + episode (escaped, not injected as HTML) */
      const seoDesc = `Watch ${anime.name} Season ${playSeason} Episode ${playEp} online free in HD on AnimeWave.`;
      const setMeta = (id, attr, value) => { const el = document.getElementById(id); if (el) el.setAttribute(attr, value); };
      setMeta('metaDescription', 'content', seoDesc);
      setMeta('ogTitle', 'content', pageTitleText);
      setMeta('ogDescription', 'content', seoDesc);
      setMeta('twTitle', 'content', pageTitleText);
      setMeta('twDescription', 'content', seoDesc);
      if (anime.image) { setMeta('ogImage', 'content', anime.image); setMeta('twImage', 'content', anime.image); }

      const metaParts = [];
      if (anime.rating) metaParts.push(`<span><i class="fas fa-star text-yellow-500 mr-1"></i>${escapeHtml(anime.rating)}</span>`);
      if (anime.studio) metaParts.push(`<span>${escapeHtml(anime.studio)}</span>`);
      if (anime.year) metaParts.push(`<span>${escapeHtml(anime.year)}</span>`);
      if (anime.episodes) metaParts.push(`<span>${escapeHtml(anime.episodes)} Episodes</span>`);
      document.getElementById('epMeta').innerHTML = metaParts.join('<span class="text-aw-border">&middot;</span>');

      document.getElementById('detailLink').href = `anime.html?id=${encodeURIComponent(anime.id)}`;
      updateSaveBtn();
      loadVideo(videoUrl);
      renderSeasonDrawer();
      renderEpList();
      updateEpNavButtons();
      bindControls();
      setProgress(anime.id, playEp, playSeason);
      addToHistory(anime.id, playSeason, playEp);
      broadcastState('play');
    }

    function updateSaveBtn() {
      const btn = document.getElementById('saveBtnNav');
      const saved = isSaved(anime.id);
      btn.innerHTML = `<i class="fas fa-bookmark ${saved ? 'text-aw-accent' : 'text-aw-muted'}"></i>`;
    }

    function handleSave() {
      if (!anime) return;
      toggleSave(anime.id, anime.name);
      updateSaveBtn();
    }

    /* ── Season switching (sidebar only, does NOT change playing video) ── */
    function switchViewSeason(num) {
      if (num === viewSeason) return;
      viewSeason = num;
      renderSeasonDrawer();
      renderEpList();
      updateEpNavButtons();
    }

    /* ── Episode Navigation ── */
    function updateEpNavButtons() {
      const nums = getSortedEpNums(viewSeason);
      /* Determine the "current" episode in the viewed season for nav purposes */
      const currentInView = (viewSeason === playSeason) ? playEp : (nums.length > 0 ? nums[0] : 0);
      const idx = nums.indexOf(currentInView);
      const hasPrev = idx > 0;
      const hasNext = idx < nums.length - 1;

      const pd = document.getElementById('epNavPrevDesktop');
      const nd = document.getElementById('epNavNextDesktop');
      if (pd) pd.disabled = !hasPrev;
      if (nd) nd.disabled = !hasNext;

      const pm = document.getElementById('epNavPrevMobile');
      const nm = document.getElementById('epNavNextMobile');
      if (pm) pm.disabled = !hasPrev;
      if (nm) nm.disabled = !hasNext;
    }

    /* Sidebar prev/next: navigates within the VIEWED season */
    function goEpSidebar(delta) {
      const nums = getSortedEpNums(viewSeason);
      const currentInView = (viewSeason === playSeason) ? playEp : (nums.length > 0 ? nums[0] : 0);
      const idx = nums.indexOf(currentInView);
      const target = nums[idx + delta];
      if (target !== undefined) {
        window.location.href = `watch.html?id=${encodeURIComponent(anime.id)}&s=${viewSeason}&e=${target}`;
      } else {
        showToast(delta > 0 ? 'No next episode' : 'No previous episode', 'info');
      }
    }

    /* Player controls prev/next: navigates within the PLAYING season */
    function goEpPlayer(delta) {
      const nums = getSortedEpNums(playSeason);
      const idx = nums.indexOf(playEp);
      const target = nums[idx + delta];
      if (target !== undefined) {
        window.location.href = `watch.html?id=${encodeURIComponent(anime.id)}&s=${playSeason}&e=${target}`;
      } else {
        showToast(delta > 0 ? 'No next episode' : 'No previous episode', 'info');
      }
    }

    /* ── Video Loading ── */
    function isDirectMedia(url) {
      try {
        const u = new URL(url);
        const path = u.pathname.toLowerCase();
        if (/\.(mp4|webm|ogg|ogv|mov|mkv|m3u8|ts)(\?|$)/.test(path)) return true;
        if (/\/(stream|hls|media|video\.m3u8|master\.m3u8)/.test(path)) return true;
        return false;
      } catch { return false; }
    }

    function loadVideo(url) {
      const v       = document.getElementById('mainVideo');
      const iframe  = document.getElementById('mainIframe');
      const spinner = document.getElementById('loadingSpinner');
      const bigPlay = document.getElementById('bigPlay');
      const wrap    = document.getElementById('videoWrap');
      const errorOv = document.getElementById('errorOverlay');
      const ctrlOverlay = document.getElementById('controlsOverlay');

      const errorMsgEl  = document.getElementById('errorOverlayMsg');
      const errorHintEl = document.getElementById('errorOverlayHint');
      const retryBtn     = document.getElementById('btnRetryLoad');
      function showError(msg, hint) {
        spinner.style.display = 'none';
        if (errorMsgEl) errorMsgEl.textContent = msg || 'Failed to load video';
        if (errorHintEl) errorHintEl.textContent = hint || 'Check the URL or try another episode';
        errorOv.style.display = 'flex';
      }
      if (retryBtn) retryBtn.onclick = () => loadVideo(url);

      errorOv.style.display = 'none';
      spinner.style.display = 'flex';
      wrap.classList.add('show-controls');

      if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }

      v.style.display = 'none';
      v.pause();
      v.removeAttribute('src');
      v.load();
      iframe.style.display = 'none';
      iframe.removeAttribute('src');
      ctrlOverlay.style.display = '';

      if (!url) {
        showError('No video URL for this episode', 'Try another episode from the list.');
        showToast('No video URL for this episode', 'error');
        return;
      }

      /* IFRAME PATH */
      if (!isDirectMedia(url)) {
        bigPlay.classList.add('hidden');
        ctrlOverlay.style.display = 'none';
        iframe.style.display = 'block';
        let iframeLoaded = false;
        iframe.onload = () => { iframeLoaded = true; spinner.style.display = 'none'; };
        iframe.onerror = () => { showError('Failed to load video', 'The source may be down — try retrying or pick another episode.'); showToast('Failed to load video', 'error'); };
        iframe.src = url;
        /* Cross-origin iframes rarely fire onerror even when the source is dead, so if
           nothing has loaded after a while, offer a retry instead of failing silently. */
        setTimeout(() => {
          if (!iframeLoaded && iframe.style.display !== 'none') {
            showError('This is taking longer than usual', 'The video source may be slow or unavailable.');
          }
        }, 12000);
        return;
      }

      /* NATIVE / HLS PATH */
      v.style.display = 'block';
      bigPlay.classList.remove('hidden');

      function onReady() { spinner.style.display = 'none'; }
      function onError() {
        showError('Failed to load video', 'Check the URL or try another episode.');
        showToast('Failed to load video', 'error');
      }

      if (url.includes('.m3u8')) {
        if (Hls.isSupported()) {
          hlsInstance = new Hls({ enableWorker: true, maxBufferLength: 30 });
          hlsInstance.loadSource(url);
          hlsInstance.attachMedia(v);
          hlsInstance.on(Hls.Events.MANIFEST_PARSED, onReady);
          hlsInstance.on(Hls.Events.ERROR, (ev, data) => {
            if (data.fatal) {
              if (data.type === Hls.ErrorTypes.NETWORK_ERROR) hlsInstance.startLoad();
              else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) hlsInstance.recoverMediaError();
              else onError();
            }
          });
        } else if (v.canPlayType('application/vnd.apple.mpegurl')) {
          v.addEventListener('loadedmetadata', onReady, { once: true });
          v.addEventListener('error', onError, { once: true });
          v.src = url;
        } else {
          showError('HLS not supported in this browser', 'Try a different browser or device.');
          showToast('HLS not supported in this browser', 'error');
        }
      } else {
        v.addEventListener('canplay', onReady, { once: true });
        v.addEventListener('error', onError, { once: true });
        v.src = url;
        v.load();
      }
    }

    /* ── Episode List ── */
    function renderEpList() {
      if (!anime) return;
      const sk = 's' + viewSeason;
      const eps = anime.episodeLinks && anime.episodeLinks[sk] ? anime.episodeLinks[sk] : {};
      const entries = Object.entries(eps);
      /* Progress is per-season now */
      const progress = getProgress(anime.id, viewSeason);
      const allEps = entries.map(([ek]) => parseInt(ek.replace('e', ''))).sort((a, b) => a - b);
      const totalEps = allEps.length;
      const isViewingPlayingSeason = (viewSeason === playSeason);

      /* Ep count badges */
      const dc = document.getElementById('epCountDesktop');
      if (dc) dc.textContent = totalEps + ' ep' + (totalEps !== 1 ? 's' : '');
      const mc = document.getElementById('epCountMobile');
      if (mc) mc.textContent = totalEps + ' ep' + (totalEps !== 1 ? 's' : '');

      /* Desktop list */
      const list = document.getElementById('epList');
      if (list) {
        list.innerHTML = entries.map(([ek, url]) => {
          const en = parseInt(ek.replace('e', ''));
          const active = isViewingPlayingSeason && en === playEp;
          const isWatched = en <= progress && !active;
          const isCurrent = en === progress + 1 && progress < totalEps && !active;

          let cls = '';
          if (active) cls = 'active';
          else if (isWatched) cls = 'watched';
          else if (isCurrent) cls = 'current';

          let statusIcon = '';
          if (isWatched) statusIcon = '<i class="fas fa-check text-green-400 text-[9px]"></i>';
          else if (isCurrent) statusIcon = '<div class="ep-current-dot"></div>';

          return `<a href="watch.html?id=${encodeURIComponent(anime.id)}&s=${viewSeason}&e=${en}" class="ep-item flex items-center gap-3 px-3 py-2.5 rounded-lg ${cls} group">
            <div class="ep-num">${isWatched ? '<i class="fas fa-check text-[10px]"></i>' : en}</div>
            <div class="flex-1 min-w-0">
              <span class="text-sm ${active ? 'text-aw-accentL font-medium' : 'text-aw-fg'}">Episode ${en}</span>
              <p class="text-[10px] text-aw-muted mt-0.5">${isWatched ? 'Watched' : isCurrent ? 'Up next' : active ? 'Playing' : ''}</p>
            </div>
            <div class="flex items-center gap-2 shrink-0">
              ${statusIcon}
              ${active ? '<i class="fas fa-play text-aw-accent text-[10px]"></i>' : '<i class="fas fa-play text-aw-border text-[10px] opacity-0 group-hover:opacity-100 transition-opacity"></i>'}
            </div>
          </a>`;
        }).join('');
      }

      /* Mobile list */
      const mobile = document.getElementById('epListMobile');
      if (mobile) {
        mobile.innerHTML = entries.map(([ek, url]) => {
          const en = parseInt(ek.replace('e', ''));
          const active = isViewingPlayingSeason && en === playEp;
          const isWatched = en <= progress && !active;
          const isCurrent = en === progress + 1 && progress < totalEps && !active;

          let cls = 'bg-aw-card';
          if (active) cls = 'active';
          else if (isWatched) cls += ' watched';

          let indicator = '';
          if (isWatched) indicator = '<i class="fas fa-check text-green-400 text-[10px]"></i>';
          else if (isCurrent) indicator = '<div class="ep-current-dot"></div>';

          return `<a href="watch.html?id=${encodeURIComponent(anime.id)}&s=${viewSeason}&e=${en}" class="mep-card flex items-center gap-3 px-3 py-3 rounded-xl ${cls} group">
            <div class="ep-num mep-num">${isWatched ? '<i class="fas fa-check text-[10px]"></i>' : en}</div>
            <div class="flex-1 min-w-0">
              <span class="text-sm ${active ? 'text-aw-accentL font-medium' : 'text-aw-fg'}">Episode ${en}</span>
              <p class="text-[10px] text-aw-muted mt-0.5">${isWatched ? 'Watched' : isCurrent ? 'Up next' : active ? 'Playing' : ''}</p>
            </div>
            <div class="flex items-center gap-2 shrink-0">
              ${indicator}
              ${active ? '<i class="fas fa-play text-aw-accent text-xs"></i>' : '<i class="fas fa-play text-aw-border text-xs opacity-0 group-hover:opacity-100 transition-opacity"></i>'}
            </div>
          </a>`;
        }).join('');
      }
    }

    /* ── Controls ── */
    function bindControls() {
      const v = document.getElementById('mainVideo');
      const wrap = document.getElementById('videoWrap');
      const bigPlay = document.getElementById('bigPlay');
      const btnPP = document.getElementById('btnPlayPause');
      const bar = document.getElementById('progressBar');
      const fill = document.getElementById('progressFill');
      const buffer = document.getElementById('progressBuffer');
      const timeDisp = document.getElementById('timeDisplay');
      const volSlider = document.getElementById('volSlider');
      const btnVol = document.getElementById('btnVol');
      const speedSel = document.getElementById('speedSelect');
      const btnFS = document.getElementById('btnFullscreen');
      const btnPrev = document.getElementById('btnPrev');
      const btnNext = document.getElementById('btnNext');

      function isNativeMode() { return document.getElementById('mainVideo').style.display !== 'none'; }

      function updatePlayUI() {
        if (!isNativeMode()) return;
        const paused = v.paused;
        wrap.classList.toggle('show-controls', paused);
        bigPlay.classList.toggle('hidden', !paused);
        btnPP.innerHTML = paused ? '<i class="fas fa-play"></i>' : '<i class="fas fa-pause"></i>';
      }

      function togglePlay() {
        if (!isNativeMode()) return;
        if (v.paused) v.play().catch(() => { });
        else v.pause();
      }

      function resetControlsTimer() {
        wrap.classList.add('show-controls');
        clearTimeout(controlsTimeout);
        if (!v.paused) controlsTimeout = setTimeout(() => wrap.classList.remove('show-controls'), 3000);
      }

      bigPlay.onclick = togglePlay;
      btnPP.onclick = togglePlay;
      v.onclick = togglePlay;
      wrap.addEventListener('mousemove', resetControlsTimer);

      v.addEventListener('play', () => { updatePlayUI(); addToHistory(anime.id, playSeason, playEp); broadcastState('play'); });
      v.addEventListener('pause', () => { updatePlayUI(); broadcastState('pause'); });
      v.addEventListener('waiting', () => { document.getElementById('loadingSpinner').style.display = 'flex'; });
      v.addEventListener('canplay', () => { document.getElementById('loadingSpinner').style.display = 'none'; });

      v.addEventListener('progress', () => {
        if (v.buffered.length > 0 && v.duration) {
          buffer.style.width = (v.buffered.end(v.buffered.length - 1) / v.duration * 100) + '%';
        }
      });

      v.addEventListener('timeupdate', () => {
        if (!v.duration) return;
        fill.style.width = (v.currentTime / v.duration * 100) + '%';
        timeDisp.textContent = fmt(v.currentTime) + ' / ' + fmt(v.duration);
      });

      v.addEventListener('ended', () => {
        updatePlayUI();
        broadcastState('stop');
      });

      /* Progress bar seek */
      let isSeeking = false;
      bar.addEventListener('mousedown', (e) => { isSeeking = true; seekTo(e); });
      bar.addEventListener('mousemove', (e) => { if (isSeeking) seekTo(e); });
      document.addEventListener('mouseup', () => { isSeeking = false; });
      bar.addEventListener('touchstart', (e) => { isSeeking = true; seekToTouch(e); }, { passive: true });
      bar.addEventListener('touchmove', (e) => { if (isSeeking) seekToTouch(e); }, { passive: true });
      bar.addEventListener('touchend', () => { isSeeking = false; });

      function seekTo(e) {
        const r = bar.getBoundingClientRect();
        const pct = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
        if (v.duration) v.currentTime = pct * v.duration;
      }
      function seekToTouch(e) {
        const r = bar.getBoundingClientRect();
        const pct = Math.max(0, Math.min(1, (e.touches[0].clientX - r.left) / r.width));
        if (v.duration) v.currentTime = pct * v.duration;
      }

      v.addEventListener('dblclick', (e) => {
        e.preventDefault();
        btnFS.click();
      });

      /* Volume */
      volSlider.oninput = () => { if (!isNativeMode()) return; v.volume = parseFloat(volSlider.value); if (v.muted) v.muted = false; updateVolIcon(); };
      btnVol.onclick = () => { if (!isNativeMode()) return; v.muted = !v.muted; updateVolIcon(); };
      function updateVolIcon() {
        const ico = (!isNativeMode() || v.muted || v.volume === 0) ? 'fa-volume-xmark' : v.volume < 0.5 ? 'fa-volume-low' : 'fa-volume-up';
        btnVol.innerHTML = `<i class="fas ${ico}"></i>`;
      }

      /* Speed */
      speedSel.onchange = () => { if (!isNativeMode()) return; v.playbackRate = parseFloat(speedSel.value); };

      /* Fullscreen */
      btnFS.onclick = () => {
        const target = isNativeMode() ? wrap : (document.getElementById('mainIframe') || wrap);
        if (document.fullscreenElement) document.exitFullscreen().catch(() => { });
        else target.requestFullscreen().catch(() => wrap.requestFullscreen().catch(() => {}));
      };
      document.addEventListener('fullscreenchange', () => {
        btnFS.innerHTML = document.fullscreenElement ? '<i class="fas fa-compress"></i>' : '<i class="fas fa-expand"></i>';
      });

      /* Player prev/next — uses PLAYING season */
      btnPrev.onclick = () => goEpPlayer(-1);
      btnNext.onclick = () => goEpPlayer(1);

      /* Broadcast timer */
      saveTimer = setInterval(() => broadcastState('update'), 3000);
      window.addEventListener('beforeunload', () => broadcastState('stop'));

      /* Keyboard */
      document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
        switch (e.key) {
          case ' ': case 'k': e.preventDefault(); togglePlay(); resetControlsTimer(); break;
          case 'ArrowLeft': if (!isNativeMode()) break; e.preventDefault(); v.currentTime = Math.max(0, v.currentTime - 10); resetControlsTimer(); break;
          case 'ArrowRight': if (!isNativeMode()) break; e.preventDefault(); v.currentTime = Math.min(v.duration || 0, v.currentTime + 10); resetControlsTimer(); break;
          case 'ArrowUp': if (!isNativeMode()) break; e.preventDefault(); v.volume = Math.min(1, v.volume + 0.1); volSlider.value = v.volume; updateVolIcon(); resetControlsTimer(); break;
          case 'ArrowDown': if (!isNativeMode()) break; e.preventDefault(); v.volume = Math.max(0, v.volume - 0.1); volSlider.value = v.volume; updateVolIcon(); resetControlsTimer(); break;
          case 'f': case 'F': e.preventDefault(); btnFS.click(); break;
          /* Keyboard N/P use PLAYING season */
          case 'n': case 'N': goEpPlayer(1); break;
          case 'p': case 'P': goEpPlayer(-1); break;
          case 'Escape':
            if (document.fullscreenElement) document.exitFullscreen();
            break;
        }
      });
    }

    loadData();
  </script>
</body>
  </html>
